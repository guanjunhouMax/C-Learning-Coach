<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ app_name }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="header-content">
                <div class="logo">
                    <span class="logo-icon">&#x1F4BB;</span>
                    <h1>{{ app_name }}</h1>
                </div>
                <p class="subtitle">{{ app_desc }}</p>
            </div>
            <div class="header-actions">
                <button id="resetBtn" class="btn btn-sm" title="清空对话">&#x1F5D1; 清空</button>
            </div>
        </header>

        <main class="chat-area" id="chatArea">
            <div class="welcome-message" id="welcomeMsg">
                <div class="welcome-icon">&#x1F4BB;</div>
                <h2>欢迎使用 C语言学习小教练</h2>
                <p>我可以帮你解答 C 语言编程问题，包括：</p>
                <div class="topic-list">
                    <span class="topic-tag">基础语法</span>
                    <span class="topic-tag">控制流</span>
                    <span class="topic-tag">数组</span>
                    <span class="topic-tag">指针</span>
                    <span class="topic-tag">函数</span>
                    <span class="topic-tag">字符串</span>
                    <span class="topic-tag">结构体</span>
                    <span class="topic-tag">文件操作</span>
                    <span class="topic-tag">内存管理</span>
                    <span class="topic-tag">预处理</span>
                </div>
                <p class="hint">在下方输入你的 C 语言问题开始学习吧！</p>
            </div>
        </main>

        <div class="input-area">
            <form id="chatForm" class="input-form">
                <input type="text" id="questionInput" placeholder="输入你的 C 语言问题..." autocomplete="off" autofocus>
                <button type="submit" id="sendBtn">&#x27A4;</button>
            </form>
            <div class="status-bar">
                <span id="modeIndicator">&#x1F4E1; 本地知识库模式</span>
            </div>
        </div>
    </div>

    <script>
        const chatArea = document.getElementById("chatArea");
        const chatForm = document.getElementById("chatForm");
        const questionInput = document.getElementById("questionInput");
        const welcomeMsg = document.getElementById("welcomeMsg");
        const sendBtn = document.getElementById("sendBtn");
        const resetBtn = document.getElementById("resetBtn");
        const modeIndicator = document.getElementById("modeIndicator");

        chatForm.addEventListener("submit", async (e) => {
            e.preventDefault();
            const question = questionInput.value.trim();
            if (!question) return;

            questionInput.value = "";
            welcomeMsg.style.display = "none";
            sendBtn.disabled = true;

            addMessage(question, "user");
            addTypingIndicator();

            try {
                const resp = await fetch("/chat", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ question })
                });
                const data = await resp.json();
                removeTypingIndicator();
                addMessage(data.answer, "bot", data.mode);
            } catch (err) {
                removeTypingIndicator();
                addMessage("网络错误，请重试。", "bot");
            }
            sendBtn.disabled = false;
            questionInput.focus();
        });

        function addMessage(text, sender, mode) {
            const msgDiv = document.createElement("div");
            msgDiv.className = "message " + sender + "-msg";

            const content = document.createElement("div");
            content.className = "msg-content";
            content.innerHTML = formatMessage(text);

            if (mode === "local") {
                const badge = document.createElement("div");
                badge.className = "mode-badge local";
                badge.textContent = "本地知识库";
                content.appendChild(badge);
            } else if (mode === "ai") {
                const badge = document.createElement("div");
                badge.className = "mode-badge ai";
                badge.textContent = "AI 回答";
                content.appendChild(badge);
            }

            msgDiv.appendChild(content);
            chatArea.appendChild(msgDiv);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function formatMessage(text) {
            text = text.replace(/```(\w*)\n([\s\S]*?)```/g, function(m, lang, code) {
                return '<pre><code class="language-' + (lang || "c") + '">' + escapeHtml(code.trim()) + "</code></pre>";
            });
            text = text.replace(/`([^`]+)`/g, "<code>$1</code>");
            text = text.replace(/^### (.+)$/gm, "<h3>$1</h3>");
            text = text.replace(/^## (.+)$/gm, "<h2>$1</h2>");
            text = text.replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");
            text = text.replace(/\n/g, "<br>");
            text = text.replace(/\|(.+)\|/g, function(m, content) {
                var cells = content.split("|").map(function(c) { return c.trim(); });
                if (cells[0].match(/^[-]+$/)) return "";
                return "<tr><td>" + cells.join("</td><td>") + "</td></tr>";
            });
            text = text.replace(/<tr>/g, "<table><tr>");
            text = text.replace(/<\/table>\s*<table>/g, "");
            text = text.replace(/<\/tr>\s*<tr>/g, "</tr><tr>");
            text = text + "</table>";
            return text;
        }

        function escapeHtml(text) {
            return text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
        }

        function addTypingIndicator() {
            const div = document.createElement("div");
            div.className = "message bot-msg";
            div.id = "typingIndicator";
            div.innerHTML = '<div class="msg-content"><div class="typing"><span></span><span></span><span></span></div></div>';
            chatArea.appendChild(div);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function removeTypingIndicator() {
            const el = document.getElementById("typingIndicator");
            if (el) el.remove();
        }

        resetBtn.addEventListener("click", async () => {
            await fetch("/reset", { method: "POST" });
            document.querySelectorAll(".message").forEach(function(m) { m.remove(); });
            welcomeMsg.style.display = "block";
            questionInput.focus();
        });
    </script>
</body>
</html>
